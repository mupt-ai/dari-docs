name: docs-user-tester-agent
harness: pi

instructions:
  system: prompts/system.md

sandbox:
  provider: e2b
  internet_access: true
  secrets:
    - DARI_DOCS_RUNTIME_SECRETS_JSON
  runtimes:
    python: "3.13"
    node: "22"
  packages:
    apt:
      - build-essential
      - ca-certificates
      - curl
      - file
      - git
      - jq
      - procps
      - ripgrep
      - unzip
      - tar

llm:
  default: medium-claude
  options:
    dumb-claude:
      provider: openrouter
      model: anthropic/claude-haiku-4.5
    medium-claude:
      provider: openrouter
      model: anthropic/claude-sonnet-4.6
    smart-claude:
      provider: openrouter
      model: anthropic/claude-opus-4.5
    dumb-gpt:
      provider: openrouter
      model: openai/gpt-5-mini
    medium-gpt:
      provider: openrouter
      model: openai/gpt-5.1
    smart-gpt:
      provider: openrouter
      model: openai/gpt-5.5

built_in_tools:
  - read
  - bash
  - write
  - edit

skills:
  - name: docs-user-test
    path: skills/docs-user-test
