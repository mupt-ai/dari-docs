name: docs-user-tester-agent
harness: pi

instructions:
  system: prompts/system.md

sandbox:
  provider: e2b
  secrets:
    - DARI_DOCS_RUNTIME_SECRETS_JSON
  runtimes:
    python: "3.13"
    node: "22"
  packages:
    apt:
      - build-essential
      - ca-certificates
      - curl
      - file
      - git
      - jq
      - procps
      - ripgrep
      - unzip
      - tar
  setup:
    script: scripts/setup_tester.sh
  env:
    PATH: /home/linuxbrew/.linuxbrew/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin

llm:
  model: openai/gpt-5.5

built_in_tools:
  - read
  - bash
  - write
  - edit

skills:
  - name: docs-user-test
    path: skills/docs-user-test
