name: docs-user-tester-agent
harness: pi

instructions:
  system: prompts/system.md

sandbox:
  provider: e2b
  internet_access: true
  secrets:
    - DARI_DOCS_RUNTIME_SECRETS_JSON
  runtimes:
    python: "3.13"
    node: "22"
  packages:
    apt:
      - build-essential
      - ca-certificates
      - curl
      - file
      - git
      - jq
      - procps
      - ripgrep
      - unzip
      - tar

llm:
  model: anthropic/claude-sonnet-4.6

built_in_tools:
  - read
  - bash
  - write
  - edit

skills:
  - name: docs-user-test
    path: skills/docs-user-test
