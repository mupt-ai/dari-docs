services:
  - type: web
    name: dari-docs-service
    runtime: go
    plan: starter
    region: oregon
    buildCommand: cd web && npm ci && npm run build && cd .. && go build -o ./bin/dari-docs-service ./cmd/dari-docs-service
    startCommand: ./bin/dari-docs-service
    healthCheckPath: /readyz
    maxShutdownDelaySeconds: 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dari-docs-service-db
          property: connectionString
      - key: PUBLIC_BASE_URL
        value: https://optimize.dari.dev
      - key: DARI_API_BASE_URL
        value: https://api.dari.dev
      - key: DARI_API_KEY
        sync: false
      - key: MANAGED_TESTER_AGENT_ID
        sync: false
      - key: MANAGED_EDITOR_AGENT_ID
        sync: false
      - key: DARI_DOCS_RELEASE_ADMIN_TOKEN
        sync: false
      - key: DARI_DOCS_SECRET_ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: dari-docs-service-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"
